<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIR SAVE | 항로 시뮬레이터</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0f1123; --card: #1a1c3a; --accent: #9f66ff; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* 사이드바 설정 */
        .sidebar { width: 180px; padding: 25px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 15px; background: rgba(0,0,0,0.2); }
        .mini-card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .label { font-size: 11px; color: #888; margin-bottom: 5px; }
        .val { font-size: 16px; font-weight: bold; color: var(--accent); }

        /* 메인 레이아웃 */
        .main { flex: 1; padding: 20px; display: grid; grid-template-columns: 420px 1fr; gap: 20px; }
        .control-panel { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 25px; font-size: 22px; letter-spacing: -1px; }
        
        label { font-size: 13px; color: #aaa; margin-left: 5px; }
        input { width: 100%; padding: 14px; margin: 8px 0 20px 0; background: #0f1123; color: white; border: 1px solid #444; border-radius: 12px; box-sizing: border-box; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(159, 102, 255, 0.3); }
        
        button { width: 100%; padding: 18px; background: var(--accent); border: none; color: white; border-radius: 14px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #8a4dff; transform: translateY(-2px); }
        button:disabled { background: #444; cursor: not-allowed; transform: none; }

        /* 🧾 영수증 스타일 결과 섹션 */
        .res-section { 
            margin-top: 30px; 
            background: #fdfdfd; 
            color: #1a1c3a; 
            padding: 25px; 
            border-radius: 4px; 
            display: none; 
            animation: fadeIn 0.5s ease; 
            font-family: 'Courier New', Courier, monospace; 
            position: relative;
            border-top: 8px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .res-section h3 { 
            text-align: center; 
            margin-top: 0; 
            border-bottom: 2px dashed #bbb; 
            padding-bottom: 15px; 
            font-size: 18px;
            letter-spacing: 2px;
        }

        .res-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; font-weight: bold; }
        .highlight { color: #d9534f; font-size: 18px; }
        
        .big-label { margin-top: 20px; font-size: 12px; color: #666; text-align: right; border-top: 1px solid #333; padding-top: 15px; }
        .big-val { font-size: 26px; font-weight: bold; text-align: right; color: #1a1c3a; margin-top: 5px; }
        
        /* 영수증 하단 지그재그 컷팅 */
        .receipt-cut {
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(-45deg, transparent 5px, #fdfdfd 0), 
                        linear-gradient(45deg, transparent 5px, #fdfdfd 0);
            background-size: 10px 10px;
        }

        #map { height: 100%; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }

        /* 📱 모바일 반응형 */
        @media (max-width: 900px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .sidebar { width: 100%; flex-direction: row; padding: 15px; box-sizing: border-box; overflow-x: auto; border-right: none; border-bottom: 1px solid #333; }
            .mini-card { min-width: 100px; padding: 10px; flex: 1; }
            .main { grid-template-columns: 1fr; padding: 15px; }
            .control-panel { order: 2; }
            #map { height: 350px; order: 1; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="mini-card"><div class="label">항공유(JET A-1)</div><div class="val">$2.84</div></div>
        <div class="mini-card"><div class="label">적용 환율</div><div class="val">{{ rate }}원</div></div>
        <div class="mini-card"><div class="label">현재 시간</div><div id="clock" class="val">--:--:--</div></div>
    </div>

    <div class="main">
        <div class="control-panel">
            <h2>✈️ AIR SAVE Simulator</h2>
            <label>출발지 (한글 검색 가능)</label>
            <input id="dep" list="air-list" placeholder="예: 인천 또는 ICN" autocomplete="off">
            <label>도착지 (한글 검색 가능)</label>
            <input id="arr" list="air-list" placeholder="예: 뉴욕 또는 JFK" autocomplete="off">
            
            <datalist id="air-list">
                {% for item in airports %}
                <option value="{{ item }}">
                {% endfor %}
            </datalist>

            <button id="sim-btn" onclick="analyze()">시뮬레이션 시작</button>

            <div id="res-box" class="res-section">
                <h3>운항 비용 영수증</h3>
                <div class="res-row"><span>투입 기종:</span><span id="ra">-</span></div>
                <div class="res-row"><span>비행 거리:</span><span id="rd">-</span></div>
                <div class="res-row"><span>예상 시간:</span><span id="rt">-</span></div>
                <div class="res-row"><span>탄소 배출:</span><span id="rco2">-</span></div>
                <div class="res-row" style="margin-top:10px;"><span>총 유류비용:</span><span id="rtc" class="highlight">-</span></div>
                
                <div class="big-label">1인당 예상 유류비 (원가)</div>
                <div id="rpc" class="big-val">-</div>

                <p style="font-size: 10px; color: #888; margin-top: 20px; text-align: center; line-height: 1.4;">
                    *본 시뮬레이션은 실시간 데이터를 기반으로 작성되었습니다.<br>
                    AIR SAVE와 함께 안전한 비행 되세요.
                </p>
                <div class="receipt-cut"></div>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([25, 120], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let line, m1, m2;

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ko-KR', {hour12: false});
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function analyze() {
            const dep = document.getElementById('dep').value;
            const arr = document.getElementById('arr').value;
            const btn = document.getElementById('sim-btn');

            if(!dep || !arr) {
                alert("출발지와 도착지 공항을 모두 선택해 주세요!");
                return;
            }

            btn.innerText = "데이터 분석 중...";
            btn.disabled = true;

            try {
                const res = await fetch(`/calculate?dep=${encodeURIComponent(dep)}&arr=${encodeURIComponent(arr)}`);
                const data = await res.json();
                
                if(data.status === "error") {
                    alert(data.message);
                    return;
                }
                
                document.getElementById('res-box').style.display = 'block';
                document.getElementById('rd').innerText = data.distance;
                document.getElementById('ra').innerText = data.airplane;
                document.getElementById('rtc').innerText = data.total_cost_display;
                document.getElementById('rpc').innerText = data.per_person_display;

                // 비행시간 계산 (한글 표시)
                const distanceNum = parseFloat(data.distance.replace(/,/g, ''));
                const hours = Math.floor(distanceNum / 850);
                const minutes = Math.round(((distanceNum / 850) - hours) * 60);
                document.getElementById('rt').innerText = `약 ${hours}시간 ${minutes}분`;

                // 탄소 배출량 계산 (한글 표시)
                const co2 = (distanceNum * 0.000115).toFixed(2);
                document.getElementById('rco2').innerText = `약 ${co2} 톤`;
                
                if(line) map.removeLayer(line);
                if(m1) map.removeLayer(m1);
                if(m2) map.removeLayer(m2);
                
                m1 = L.marker(data.coords.dep).addTo(map);
                m2 = L.marker(data.coords.arr).addTo(map);
                
                line = L.polyline([data.coords.dep, data.coords.arr], {
                    color: '#9f66ff', weight: 3, dashArray: '10, 10'
                }).addTo(map);
                
                map.fitBounds(line.getBounds(), {padding: [50, 50]});

            } catch (e) {
                alert("서버 통신 오류가 발생했습니다.");
            } finally {
                btn.innerText = "시뮬레이션 시작";
                btn.disabled = false;
            }
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() { this.select(); });
        });
    </script>
</body>
</html>
